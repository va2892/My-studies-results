<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="histogram">
        <span class="label">Доходность предприятия по месяцам</span>

        <div class="chart">
            <div class="scale-container">
                <span>120k</span>
                <span>90k</span>
                <span>60k</span>
                <span>30k</span>
                <span>0</span>
            </div>
            <div class="vertical-divivder"></div>
            <div class="data-container" style="margin-right: 10px; z-index: 10;">
                <div class="item">
                    <div class="data jan"></div>
                    <div class="horizontal-divivder"></div>
                    <span class="amount">42k</span>
                    <span class="month">JAN</span>
                </div>
                <div class="item">
                    <div class="data feb"></div>
                    <span class="amount">80k</span>
                    <span class="month">FEB</span>
                </div>
                <div class="item">
                    <div class="data mar"></div>
                    <span class="amount">104k</span>
                    <span class="month">MAR</span>
                </div>
                <div class="item">
                    <div class="data apr bad"></div>
                    <span class="amount bad">96k</span>
                    <span class="month">APR</span>
                </div>
                <div class="item">
                    <div class="data may"></div>
                    <span class="amount">107k</span>
                    <span class="month">MAY</span>
                </div>
                <div class="item">
                    <div class="data jun"></div>
                    <span class="amount bad">99k</span>
                    <span class="month">JUN</span>
                </div>
                <div class="item">
                    <div class="data jul"></div>
                    <span class="amount">116k</span>
                    <span class="month">JUL</span>
                </div>
                <div class="item">
                    <div class="data aug"></div>
                    <span class="amount">118k</span>
                    <span class="month">AUG</span>
                </div>
                <div class="item">
                    <div class="data sept"></div>
                    <span class="amount bad">105k</span>
                    <span class="month">SEPT</span>
                </div>
                <div class="item">
                    <div class="data oct"></div>
                    <span class="amount bad">92k</span>
                    <span class="month">OCT</span>
                </div>
                <div class="item">
                    <div class="data nov"></div>
                    <span class="amount">109k</span>
                    <span class="month">NOV</span>
                </div>
                <div class="item">
                    <div class="data dec"></div>
                    <span class="amount">120k</span>
                    <span class="month">DEC</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
