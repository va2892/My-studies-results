<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="datepicker">
        <div class="datepicker-top">
            <div class="btn-group">
                <button class="tag">Сегодня</button>
                <button class="tag">Завтра</button>
            </div>
            <div class="month-selector">
                <button class="arrow">
                    <svg width="9" height="16" viewBox="0 0 9 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 1L1 8L8 15" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <span>Декабрь 2020</span>
                <button class="arrow">
                    <svg width="9" height="16" viewBox="0 0 9 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 1L8 8L1 15" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="datepicker-calendar">
            <span>Mo</span>
            <span>Tu</span>
            <span>We</span>
            <span>Th</span>
            <span>Fr</span>
            <span>Sa</span>
            <span>Su</span>
            <button class="date past-month">30</button>
            <button class="date current-month">1</button>
            <button class="date current-month">2</button>
            <button class="date current-month">3</button>
            <button class="date current-month">4</button>
            <button class="date current-month">5</button>
            <button class="date current-month">6</button>
            <button class="date current-month">7</button>
            <button class="date current-month">8</button>
            <button class="date current-month active">9</button>
            <button class="date current-month">10</button>
            <button class="date current-month">11</button>
            <button class="date current-month">12</button>
            <button class="date current-month">13</button>
            <button class="date current-month">14</button>
            <button class="date current-month">15</button>
            <button class="date current-month">16</button>
            <button class="date current-month">17</button>
            <button class="date current-month">18</button>
            <button class="date current-month">19</button>
            <button class="date current-month">20</button>
            <button class="date current-month">21</button>
            <button class="date current-month">22</button>
            <button class="date current-month">23</button>
            <button class="date current-month">24</button>
            <button class="date current-month">25</button>
            <button class="date current-month">26</button>
            <button class="date current-month">27</button>
            <button class="date current-month">28</button>
            <button class="date current-month">29</button>
            <button class="date current-month">30</button>
            <button class="date current-month">31</button>
            <button class="date past-month">1</button>
            <button class="date past-month">2</button>
            <button class="date past-month">3</button>
        </div>
    </div>
</body>
</html>
