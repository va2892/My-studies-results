            <svg width="17" height="17">

                    <rect x="2.12" width="19.997" height="2.99813" transform="rotate(45 2.12 0)" fill="white"/>
                </svg>
                <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="14.14" width="2.99813" height="19.997" transform="rotate(45 14.14 0)" fill="white"/>
                </svg>
            </svg>
        </button>
        <div data-test-id="floating-buttons-inner-button">1</div>
        <div data-test-id="floating-buttons-inner-button">2</div>
        <div data-test-id="floating-buttons-inner-button">3</div>
        <div data-test-id="floating-buttons-inner-button">4</div>
