<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="out" data-test-id="field">
        <div class="field" data-test-id="field-elements-container">

            <div class="red-goal"></div>
            <div class="red-penalty-area"></div>
            <div class="red-penalty-arc"></div>

            <div class="red-team red-goalkeeper" data-test-id="player"></div>
            <div class="red-team red-sweeper" data-test-id="player"></div>
            <div class="red-team red-centre-back-left" data-test-id="player"></div>
            <div class="red-team red-centre-back-right" data-test-id="player"></div>
            <div class="red-team red-wing-back-left" data-test-id="player"></div>
            <div class="red-team red-wing-back-right" data-test-id="player"></div>
            <div class="red-team red-centre-midfield-left" data-test-id="player"></div>
            <div class="red-team red-centre-midfield-right" data-test-id="player"></div>
            <div class="red-team red-centre-forward-left" data-test-id="player"></div>
            <div class="red-team red-centre-forward-right" data-test-id="player"></div>
            <div class="red-team red-centre-forward" data-test-id="player"></div>            

            <div class="vertical-divider"></div>
            <div class="central-circle" data-test-id="center-circle"></div>

            <div class="blue-goal"></div>
            <div class="blue-penalty-area"></div>
            <div class="blue-penalty-arc"></div>

            <div class="blue-team blue-goalkeeper" data-test-id="player"></div>
            <div class="blue-team blue-sweeper" data-test-id="player"></div>
            <div class="blue-team blue-centre-back-left" data-test-id="player"></div>
            <div class="blue-team blue-centre-back-right" data-test-id="player"></div>
            <div class="blue-team blue-wing-back-left" data-test-id="player"></div>
            <div class="blue-team blue-wing-back-right" data-test-id="player"></div>
            <div class="blue-team blue-centre-midfield-left" data-test-id="player"></div>
            <div class="blue-team blue-centre-midfield-right" data-test-id="player"></div>
            <div class="blue-team blue-centre-forward-left" data-test-id="player"></div>
            <div class="blue-team blue-centre-forward-right" data-test-id="player"></div>
            <div class="blue-team blue-centre-forward" data-test-id="player"></div>

        </div>
    </div>
</body>
</html>
