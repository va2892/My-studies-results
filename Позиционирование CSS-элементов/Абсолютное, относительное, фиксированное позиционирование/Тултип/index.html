<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tooltips" data-test-id="tooltips-container">

        <div class="container">
            <button class="button" data-test-id="button">Left</button>
            <div class="tooltip left" data-test-id="tooltip">Left</div>
        </div>

        <div class="container">
            <button class="button" data-test-id="button">Top</button>
            <div class="tooltip top" data-test-id="tooltip">Top</div>
        </div>

        <div class="container">
            <button class="button" data-test-id="button">Bottom</button>
            <div class="tooltip bottom" data-test-id="tooltip">Bottom</div>
        </div>

        <div class="container last">
            <button class="button" data-test-id="button">Right</button>
            <div class="tooltip right" data-test-id="tooltip">Right</div>
        </div>

    </div>
</body>
</html>
