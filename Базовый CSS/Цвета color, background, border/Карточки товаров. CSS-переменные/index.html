<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="introductory-container">
            <div class="avatar">JD</div>
            <h2 class="full-name">John Doe</h2>
            <p class="desc">Frontend Developer</p>
        </div>
        <div class="stats-container">
            <div class="field">
                <h3 class="amount">156</h3><p class="explanation">Projects</p>
            </div>
            <div class="field">
                <h3 class="amount">2.4k</h3><p class="explanation">Followers</p>
            </div>
            <div class="field">
                <h3 class="amount">18</h3><p class="explanation">Awards</p>
            </div>
        </div>
        <div class="contact-container">
            <button class="button follow"><p class="text">Follow</p></button>
            <button class="button message"><p class="text">Message</p></button>
        </div>
        <div class="status-container">
            <div class="track-field available">
                <p class="tracked-amount">Status:</p><p class="result">Available</p>
            </div>
            <div class="track-field connection-failed">
                <p class="tracked-amount">Last Login:</p><p class="result">Connection Failed</p>
            </div>
            <div class="track-field not-confirmed">
                <p class="tracked-amount cut-warning">Email:</p><p class="result">Not Confirmed</p>
            </div>
        </div>
    </div>
</body>
</html>
