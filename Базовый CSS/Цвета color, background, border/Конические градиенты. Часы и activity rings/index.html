<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="clock">
            <div class="hand hour"></div>
            <div class="hand minute"></div>
        </div>

        <div class="activity">
            <div class="ring steps"></div>
            <div class="ring kcal"></div>
            <div class="ring sleep"></div>
        </div>

        <div class="progress">
            <div class="info">
              <span>65%</span>
              <small>PROGRESS</small>
            </div>
        </div>
    </div>
</body>
</html>
