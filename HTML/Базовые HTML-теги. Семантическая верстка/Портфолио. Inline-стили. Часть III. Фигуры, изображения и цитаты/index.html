<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body style="
    margin: auto;
    width: 800px;
    height: 685px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px 0px #0000001A;
    margin-top: 30px; 
">
    <div style="
        width: 800px;
        height: 377px;
        border-bottom-width: 1px;
        padding-top: 50px;
        padding-right: 30px;
        padding-bottom: 47px;
        padding-left: 30px;
        border-bottom: 1px solid #ECEFF1;
        box-sizing: border-box;
    ">
        <h2 style="
            margin-top: 0;
            width: 720px;
            height: 28px;
            color: #1565C0;
            font-family: sans-serif;
            font-weight: 700;
            font-size: 23.44px;
            line-height: 100%;
            border-left: 5px solid #1565C0;
            padding-left: 20px;
        ">Portfolio Highlights</h2>
        <figure style="
            margin: 0;
            width: 224px;
            height: 191px;
        ">
            <img src="image.png" style="
                width: 224px;
                height: 150px;
                border-radius: 8px;
                border-width: 1px;
                border: 1px solid #E0E0E0
            ">
            <figcaption style="
                margin: 0;
                width: 224px;
                height: 33px;
                line-height: 100%;
                text-align: center;
                font-family: sans-serif;
                margin-top: 5px;
                color:#546E7A;
                font-size: 15.4px; 
            ">
                <strong>EcoTracker App</strong>
                <br>
                <small>UI Design & Development</small>
            </figcaption>
        </figure>
        <p style="
            width: 740px;
            height: 19px;
            font-family: sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 100%;
            text-align: center;
            color: #1565C0;
        ">
            <a 
                style="text-decoration: none;" 
                onmouseover="this.style.textDecoration='underline';" 
                onmouseout="this.style.textDecoration='none';"
            >View Full Portfolio →</a>
        </p>
    </div>
    <div style="
        width: 800px;
        height: 308px;
        border-bottom-width: 1px;
        padding-top: 50px;
        padding-right: 30px;
        padding-bottom: 51px;
        padding-left: 30px;
        box-sizing: border-box;
        background: #FAFAFA;
    ">
        <h2 style="
            margin: 0;
            width: 740px;
            height: 28px;
            padding-left: 20px;
            border-left: 5px solid #1565C0;
            font-family: sans-serif;
            font-weight: 700;
            font-size: 23.44px;
            line-height: 100%;
            color: #1565C0;
        ">Inspiration Corner</h2>
        <blockquote style="
            margin-left: 0;
            box-sizing: border-box;
            width: 740px;
            height: 69px;
            border-left-width: 3px;
            padding-top: 10px;
            padding-right: 20px;
            padding-bottom: 10px;
            padding-left: 23px;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            background: #E3F2FD;
            border-left: 3px solid #BBDEFB
        ">
            <p style="
                margin: 0;
                font-family: sans-serif;
                font-weight: 400;
                font-style: Italic;
                font-size: 15px;
                line-height: 100%;
                color: #546E7A;
            ">"Design is not just what it looks like and feels like. Design is how it works."</p>
            <cite style="
                margin-top: 10px;
                display: block;
                font-family: sans-serif;
                font-weight: 700;
                font-style: Italic;
                font-size: 15.75px;
                line-height: 100%;
                text-align: right;
                vertical-align: middle;
                color: #546E7A;
            ">— Steve Jobs</cite>
        </blockquote>
        <blockquote style="
            margin-left: 0;
            box-sizing: border-box;
            width: 740px;
            height: 69px;
            border-left-width: 3px;
            padding-top: 10px;
            padding-right: 20px;
            padding-bottom: 10px;
            padding-left: 23px;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            background: #E3F2FD;
            border-left: 3px solid #BBDEFB
        ">
            <p style="
                margin: 0;
                font-family: sans-serif;
                font-weight: 400;
                font-style: Italic;
                font-size: 15px;
                line-height: 100%;
                color: #546E7A;
            ">"The best way to predict the future is to implement it."</p>
            <cite style="
                margin-top: 10px;
                display: block;
                font-family: sans-serif;
                font-weight: 700;
                font-style: Italic;
                font-size: 15.75px;
                line-height: 100%;
                text-align: right;
                vertical-align: middle;
                color: #546E7A;
            ">— David Heinemeier Hansson</cite>
        </blockquote>
    </div>
</body>
</html>
