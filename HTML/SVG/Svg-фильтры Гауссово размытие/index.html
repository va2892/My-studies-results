        <text x="200" y="525" font-family="Arial" font-size="10" text-anchor="middle" filter="url(#blur5)">Б К Ш М И Ы Н</text>
        <text x="200" y="555" font-family="Arial" font-size="8" text-anchor="middle" filter="url(#blur5)">Н К И Б М Ш Ы Б</text>
    </svg>
