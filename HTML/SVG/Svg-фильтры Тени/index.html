<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="softShadow">
                <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="red" flood-opacity="0.4"/>
            </filter>
            <filter id="hardShadow">
                <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="darkgreen" flood-opacity="0.6"/>
            </filter>
            <filter id="blueGlow">
                <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="blue" flood-opacity="0.5"/>
            </filter>
        </defs>
        <circle cx="50" cy="50" r="40" fill="#e74c3c" filter="url(#softShadow)"/>
        <rect x="10" y="120" width="100" height="100" r="40" fill="#2ecc71" filter="url(#hardShadow)"/>
        <circle cx="40" cy="280" r="30" fill="#1abc9c" filter="url(#blueGlow)"/>
    </svg>
</body>
</html>
