<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="popover-container">
        <button aria-haspopup="true" aria-controls="popover" aria-expanded="false" class="open" data-test-id="popover-button">📖</button>
        <div id="popover" data-test-id="popover">
            <h2>Book Information</h2>
            <p>Did you know? The world's oldest known book is The Diamond Sutra, printed in China in AD 868.</p>
            <button aria-label="Close" class="close" data-test-id="popover-close-button">×</button>
        </div>
    </div>
</body>
</html>
