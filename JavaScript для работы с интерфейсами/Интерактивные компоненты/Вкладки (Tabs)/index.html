<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="tabs-conatiner">
        <div class="buttons-conatiner">
            <button class="tab-button active" data-button="1" data-test-id="tab-1">Home</button>
            <button class="tab-button" data-button="2" data-test-id="tab-2">About</button>
            <button class="tab-button" data-button="3" data-test-id="tab-3">Contact</button>
        </div>
        <div class="content-conatiner">
            <div class="tab-content active" data-content="1">
                <h2>Welcome Home!</h2>
                <p>This is your home panel. Enjoy your stay!</p>
            </div>
            <div class="tab-content" data-content="2">
                <h2>About Us</h2>
                <p>We are a simple tabs example built with vanilla JS.</p>
            </div>
            <div class="tab-content" data-content="3">
                <h2>Contact</h2>
                <p>Reach us at <a href="mailto:info@example.com">info@example.com</a>.</p>
            </div>
        </div>
    </div>
</body>
</html>
