<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="select" aria-expanded="false" data-test-id="select">
        <span>Choose an Option</span>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 7.5L10 12.5L15 7.5" stroke="#2196F3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoround"/>
        </svg>
        <div class="options-container" data-test-id="select-options-container">
            <div class="option first">Option 1</div>
            <div class="option second">Option 2</div>
            <div class="option last">Option 3</div>
        </div>
    </div>
</body>
</html>
